<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">

    <title>BPMN Token Simulation Demo</title>

    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>

    <link rel="stylesheet" href="./dist/vendor/bpmn-js/assets/diagram-js.css" />
    <link rel="stylesheet" href="./dist/vendor/bpmn-js/assets/bpmn-js.css" />
    <link rel="stylesheet" href="./dist/vendor/bpmn-js/assets/bpmn-font/css/bpmn-embedded.css" />
    <link rel="stylesheet" href="./dist/vendor/bpmn-js-token-simulation/assets/css/bpmn-js-token-simulation.css" />
    <link rel="stylesheet" href="./dist/vendor/bpmn-js-properties-panel/assets/properties-panel.css" />
    <link rel="stylesheet" href="./dist/vendor/bpmn-js-color-picker/colors/color-picker.css" />
    <link rel="stylesheet" href="./dist/vendor/bpmn-js-bpmnlint/assets/css/bpmn-js-bpmnlint.css" />
    <link rel="stylesheet" href="./dist/vendor/diagram-js-minimap/assets/diagram-js-minimap.css" />
    <link rel="stylesheet" href="./style.css" />

    <link rel="icon" type="image/png" href="favicon.png" />

    <meta property="og:locale" content="en_US" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="bpmn-js-token-simulation demo" />
    <meta property="og:title" content="BPMN Token Simulation Demo" />
    <meta property="og:url" content="https://bpmn-io.github.io/bpmn-js-token-simulation/index.html" />
    <meta property="og:description"
        content="Simulate your BPMN diagrams with bpmn-js-token-simulation. Understand and learn BPMN execution semantics one token at a time." />
    <meta property="og:image" content="https://bpmn-io.github.io/bpmn-js-token-simulation/screenshot.png" />
</head>

<body>

    <div id="simulation-control-stack">
        <div class="group" id="io-group">
            <h3>I/O Operations</h3>
            <button class="link" id="open-button">Open Diagram</button>
            <button class="link" id="download-button">Download BPMN</button>
            <button class="link" id="export-png">Export as PNG</button>
            <button class="link" id="export-svg">Export as SVG</button>
            <button class="link" id="theme-toggle">Toggle Theme</button>
            <button class="link" id="toggle-heatmap">Toggle Heatmap</button>
        </div>

        <div class="group" id="control-group">
            <h3>Control</h3>
            <button class="link" id="play-state-sequence">Play state sequence</button>
            <div id="control-anim-wrapper"></div>
        </div>

        <div class="group" id="monitor-group">
            <h3>Monitoring</h3>
            <div id="lint-panel" class="state-panel visible" aria-live="polite" style="margin-bottom: 15px;">
                <div class="state-panel-header">
                    <span id="lint-panel-title">Errori e Warning Linter</span>
                </div>
                <div class="state-panel-table-wrapper">
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr>
                                <th style="border: 1px solid #ccc; padding: 5px;">ELEMENTO</th>
                                <th style="border: 1px solid #ccc; padding: 5px;">MESSAGGIO</th>
                            </tr>
                        </thead>
                        <tbody id="linting-messages">
                            <tr>
                                <td class="state-panel-empty" colspan="2" style="text-align: center; border: 1px solid #ccc; padding: 5px;">Nessun problema rilevato</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div id="state-panel" class="state-panel" aria-live="polite">
                <div class="state-panel-header">
                    <span id="state-panel-title">State sequence</span>
                </div>
                <div class="state-panel-table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Attivit&agrave;</th>
                                <th>Stato</th>
                            </tr>
                        </thead>
                        <tbody id="state-panel-body">
                            <tr>
                                <td class="state-panel-empty" colspan="2">Premi "Play state sequence" per vedere gli
                                    stati</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="message-panel" class="state-panel" aria-live="polite" style="margin-top: 15px;">
                <div class="state-panel-header">
                    <span id="message-panel-title">Message Interceptor</span>
                </div>
                <div class="state-panel-table-wrapper">
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr>
                                <th style="border: 1px solid #ccc; padding: 5px;">SOURCE</th>
                                <th style="border: 1px solid #ccc; padding: 5px;">DESTINATARIO</th>
                                <th style="border: 1px solid #ccc; padding: 5px;">ID</th>
                                <th style="border: 1px solid #ccc; padding: 5px;">PAYLOAD</th>
                            </tr>
                        </thead>
                        <tbody id="message-panel-body">
                            <tr>
                                <td class="state-panel-empty" colspan="4" style="text-align: center; border: 1px solid #ccc; padding: 5px;">
                                    Nessun messaggio tracciato
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="group" id="properties-group">
            <h3>Properties</h3>
            <div class="properties-panel" id="properties-panel"></div>
        </div>
    </div>

    <div class="canvas-parent">
        <div class="canvas" id="canvas">
            <div class="djs-minimap"></div>
        </div>
    </div>

    <script src="./dist/modeler.js"></script>
    <script src="./theme-toggle.js"></script>
</body>

</html>
